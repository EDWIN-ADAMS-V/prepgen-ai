<!DOCTYPE html>
<html lang="en">

</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">PrepGen AI</a>

</html>
