{% extends "base.html" %}

{% block content %}

<div class="card shadow text-center">
  <div class="card-body">
    <h3 class="mb-4">Diagnostic Results</h3>

    <p>Quantitative: {{ scores.Quantitative }}/5</p>
    <p>Reasoning: {{ scores.Reasoning }}/5</p>
    <p>English: {{ scores.English }}/5</p>

    <h4 class="mt-3">Total Score: {{ total }}/15</h4>

    <a href="/dashboard" class="btn btn-primary mt-3">Go to Dashboard</a>
  </div>
</div>

{% endblock %}
